<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Predictor AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d1117;
color:white;
}

header{
background:#16a34a;
padding:20px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.4);
}

header h1{
font-size:30px;
}

header p{
margin-top:8px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#161b22;
border-radius:15px;
padding:20px;
margin-top:20px;
box-shadow:0 0 10px rgba(0,0,0,.3);
}

.match{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:20px;
}

.team{
font-size:20px;
font-weight:bold;
}

.vs{
font-size:18px;
color:#16a34a;
}

button{
margin-top:20px;
width:100%;
padding:15px;
background:#16a34a;
border:none;
border-radius:10px;
font-size:18px;
color:white;
cursor:pointer;
}

button:hover{
background:#15803d;
}

footer{
margin-top:40px;
text-align:center;
padding:20px;
color:#888;
}
</style>

</head>
<body>

<header>
<h1>⚽ Football Predictor AI</h1>
<p>Prédictions intelligentes des matchs de football</p>
</header>

<div class="container">

<div class="card">

<h2>🔥 Match du jour</h2>

<div class="match">
<div class="team">PSG</div>

<div class="vs">VS</div>

<div class="team">Marseille</div>
</div>

<button>Voir la prédiction</button>

</div>

<div class="card">

<h2>📊 Probabilités</h2>

<p>🏆 PSG : 65%</p>
<br>
<p>🤝 Match nul : 20%</p>
<br>
<p>⚽ Marseille : 15%</p>

</div>

</div>

<footer>

Football Predictor AI © 2026

</footer>

</body>
</html>
